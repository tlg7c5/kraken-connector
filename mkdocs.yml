site_name: kraken-connector
repo_url: https://github.com/tlg7c5/kraken-connector
site_url: https://tlg7c5.github.io/kraken-connector
site_description: Typed Python client for the Kraken REST and WebSocket v2 API
site_author: Terry Garner
edit_uri: edit/main/docs/
repo_name: tlg7c5/kraken-connector
copyright: Maintained by Terry Garner.

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Authentication: getting-started/authentication.md
  - Guides:
      - REST API: guides/rest-api.md
      - Rate Limiting: guides/rate-limiting.md
      - WebSocket Client: guides/websocket.md
      - Order Book: guides/order-book.md
      - Trading: guides/trading.md
      - Error Handling: guides/error-handling.md
      - Logging: guides/logging.md
  - Architecture: architecture.md
  - API Reference:
      - HTTP Clients: reference/http.md
      - Resilience: reference/resilience.md
      - WebSocket Client: reference/ws-client.md
      - WebSocket Trading: reference/ws-trading.md
      - Exceptions: reference/exceptions.md
      - Schemas: reference/schemas.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append('../')
          options:
            show_symbol_type_heading: true
            show_submodules: true
            summary: true
            merge_init_into_class: true
            show_signature_annotations: true
            signature_crossrefs: true
            docstring_section_style: list

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tlg7c5/kraken-connector
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/kraken-connector

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
